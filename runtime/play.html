<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="dark">
  <title>GameFilm — local play</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#0a0b10;overflow:hidden;touch-action:none;overscroll-behavior:none;font-family:system-ui,-apple-system,sans-serif;color:#e8eaf0}
    #gf-root{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%}
    #gf-canvas-wrap{display:flex;align-items:center;justify-content:center;flex:1;width:100%}
    #gf-canvas{display:block;cursor:crosshair}
    #gf-status{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:16px;color:#8b8fa8}
    #gf-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(10,11,16,0.85);z-index:100}
    .gf-overlay-content{text-align:center;padding:32px}
    .gf-overlay-message{font-size:28px;font-weight:700;margin-bottom:20px}
    .gf-overlay-btn{display:inline-block;margin:8px;padding:10px 28px;background:#e8eaf0;color:#0a0b10;border:none;border-radius:4px;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none}
  </style>
</head>
<body>
  <div id="gf-root"></div>
  <script type="module" src="/runtime/play-boot.js"></script>
</body>
</html>
